name: Build MSIX sideload package

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64, x86]

    runs-on: windows-latest

    env:
      Solution_Name: src\InternalsViewer.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v0
      with:
        versionSpec: '5.x'

    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    - name: Decode the pfx
      shell: pwsh
      run: |
        $pfxCertBytes = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
        $pfxPath = Join-Path $env:RUNNER_TEMP "GitHubActionsWorkflow.pfx"
        [IO.File]::WriteAllBytes($pfxPath, $pfxCertBytes)
        "PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    
    - name: Import certificate
      shell: pwsh
      run: |
        $securePassword = ConvertTo-SecureString "${{ secrets.PFX_PASSWORD }}" -AsPlainText -Force
        Import-PfxCertificate `
          -FilePath "$env:PFX_PATH" `
          -CertStoreLocation Cert:\CurrentUser\My `
          -Password $securePassword | Out-Null

    - name: Create the app package
      shell: pwsh
      run: |
        msbuild $env:Solution_Name `
          /p:Configuration=$env:Configuration `
          /p:Platform=$env:Platform `
          /p:UapAppxPackageBuildMode=$env:Appx_Package_Build_Mode `
          /p:AppxBundle=$env:Appx_Bundle `
          /p:PackageCertificateKeyFile="$env:PFX_PATH" `
          /p:PackageCertificatePassword="${{ secrets.PFX_PASSWORD }}" `
          /p:AppxPackageDir="$env:Appx_Package_Dir" `
          /p:GenerateAppxPackageOnBuild=true `
          /verbosity:quiet
      env:
        Appx_Bundle: Never
        Appx_Package_Build_Mode: SideloadOnly
        Appx_Package_Dir: ${{ github.workspace }}\Packages\
        Configuration: ${{ matrix.configuration }}
        Platform: ${{ matrix.platform }}
    
    - name: Remove the pfx
      shell: pwsh
      if: always()
      run: |
        if (Test-Path "$env:PFX_PATH") { Remove-Item "$env:PFX_PATH" -Force }
    
    - name: Upload MSIX package
      uses: actions/upload-artifact@v4
      with:
        name: msix-package-${{ matrix.platform }}
        path: Packages/**/*
        if-no-files-found: error
        
