<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
    <g id="sql-execution-plan-compute-scalar-icon">

        <!-- main operator rectangle -->
        <g id="compute-scalar-operator-frame"
           stroke="#424242"
           stroke-width="2"
           fill="none"
           stroke-linejoin="round"
           stroke-linecap="square">

            <rect id="compute-scalar-main-rect"
                  x="3"
                  y="5"
                  width="23"
                  height="20" />
        </g>

        <!-- calculator overlay -->
        <g id="compute-scalar-calculator"
           stroke="#424242"
           stroke-width="2">

            <rect id="calculator-body"
                  x="16"
                  y="13"
                  width="12"
                  height="15"
                  fill="#FFFFFF" />

            <path id="calculator-display"
                  stroke="#0078D4"
                  d="M 19 17 L 25 17" />
        </g>

        <g id="calculator-buttons" fill="#0078D4">
            <circle id="calculator-button-1" cx="20" cy="21" r="1" />
            <circle id="calculator-button-2" cx="24" cy="21" r="1" />
            <circle id="calculator-button-3" cx="20" cy="25" r="1" />
            <circle id="calculator-button-4" cx="24" cy="25" r="1" />
        </g>

    </g>
</svg>