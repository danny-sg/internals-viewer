<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <g id="input-to-list-icon">

    <!-- structural lines -->
    <g id="structure-paths" stroke="#424242" stroke-width="2" fill="none" stroke-linejoin="round">
      <!-- connector from node to document -->
      <path id="connector-path" d="M 6 16 L 12 16" />
    </g>

    <!-- nodes -->
    <g id="nodes" fill="#424242">
      <!-- input node -->
      <circle id="input-node" cx="6" cy="16" r="2" />
    </g>

    <!-- document/list -->
    <g id="document-structure" stroke="#424242" stroke-width="2" fill="none" stroke-linejoin="round">
      <!-- outer rectangle -->
      <rect id="doc-outline" x="12" y="6" width="14" height="20" />

      <!-- horizontal lines (text rows) -->
      <path d="M 15 10 L 23 10" />
      <path d="M 15 14 L 23 14" />
      <path d="M 15 18 L 23 18" />
      <path d="M 15 22 L 23 22" />
    </g>

    <!-- execution/flow arrow -->
    <g id="flow-arrow" fill="#0078D4">
      <path id="arrow-stem" d="M 8 16 L 16 16" fill="none" stroke="#0078D4" stroke-width="2" stroke-linejoin="round" />
      <polygon id="arrow-head" points="16,13 20,16 16,19" />
    </g>

  </g>
</svg>