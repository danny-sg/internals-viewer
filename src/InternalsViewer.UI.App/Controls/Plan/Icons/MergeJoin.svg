<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">

    <g id="sql-execution-plan-merge-join-icon">

        <!-- left and right input rectangles -->
        <g id="merge-join-input-structures"
           stroke="#424242"
           stroke-width="2"
           fill="none"
           stroke-linejoin="round"
           stroke-linecap="square">

            <!-- left input -->
            <rect id="merge-join-left-input-rect"
                  x="4"
                  y="13"
                  width="8"
                  height="16" />

            <!-- right input -->
            <rect id="merge-join-right-input-rect"
                  x="20"
                  y="13"
                  width="8"
                  height="16" />
        </g>
    </g>
    <g id="merge-join-flow"
       stroke="#0078D4"
       stroke-width="2"
       fill="none"
       stroke-linejoin="round"
       stroke-linecap="square">

        <!-- central upward output path -->
        <path id="merge-join-output-path"
              d="M 16 24 L 16 5" />

        <!-- left input merges into centre -->
        <path id="merge-join-left-merge-path"
              d="M 8 23 L 16 15" />

        <!-- right input merges into centre -->
        <path id="merge-join-right-merge-path"
              d="M 24 23 L 16 15" />
    </g>

    <!-- output arrowhead -->
    <g id="merge-join-arrowhead" fill="#0078D4">
        <polygon id="merge-join-output-arrowhead"
                 points="13,6 16,2 19,6" />
    </g>

    </svg>