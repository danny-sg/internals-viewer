<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
    <g id="sql-execution-plan-rid-lookup-icon">

        <!-- B-tree structure -->
        <g id="rid-lookup-btree-structural-paths"
           stroke="#424242"
           stroke-width="2"
           fill="none"
           stroke-linejoin="round">

            <path id="rid-lookup-central-trunk-path"
                  d="M 16 5 L 16 25" />

            <path id="rid-lookup-left-branch-path"
                  d="M 16 13 L 8 13 L 8 25" />

            <path id="rid-lookup-right-branch-path"
                  d="M 16 13 L 24 13 L 24 25" />
        </g>

        <!-- B-tree nodes -->
        <g id="rid-lookup-btree-data-nodes" fill="#424242">
            <circle id="rid-lookup-root-node-circle"
                    cx="16" cy="5" r="2" />

            <circle id="rid-lookup-leaf-node-left-circle"
                    cx="8" cy="25" r="2" />

            <circle id="rid-lookup-leaf-node-center-circle"
                    cx="16" cy="25" r="2" />

            <circle id="rid-lookup-leaf-node-right-circle"
                    cx="24" cy="25" r="2" />
        </g>

        <!-- magnifier background to keep overlay clean -->
        <g id="rid-lookup-magnifier-background" fill="#FFFFFF">
            <circle cx="8" cy="24" r="5" />
        </g>

        <!-- RID lookup magnifier -->
        <g id="rid-lookup-magnifier"
           stroke="#0078D4"
           stroke-width="2"
           fill="none"
           stroke-linejoin="round"
           stroke-linecap="square">

            <circle id="rid-lookup-magnifier-lens"
                    cx="8" cy="24" r="4" />

            <path id="rid-lookup-magnifier-handle"
                  d="M 11 27 L 15 31" />
        </g>

    </g>
</svg>
