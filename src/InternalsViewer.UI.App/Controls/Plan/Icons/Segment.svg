<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <g id="sql-execution-plan-segment-icon">

    <!-- left highlighted segment rectangle -->
    <g id="segment-left-rectangle"
       stroke="#0078D4"
       stroke-width="2"
       fill="none"
       stroke-linejoin="round"
       stroke-linecap="square">

      <rect id="segment-left-rect"
            x="3"
            y="5"
            width="11"
            height="22" />

      <!-- internal segment marks -->
      <path id="segment-left-mark-1" d="M 6 10 L 11 10" />
      <path id="segment-left-mark-2" d="M 6 14 L 11 14" />
      <path id="segment-left-mark-3" d="M 6 18 L 11 18" />
      <path id="segment-left-mark-4" d="M 6 22 L 11 22" />
    </g>

    <!-- right segment rectangle -->
    <g id="segment-right-rectangle"
       stroke="#424242"
       stroke-width="2"
       fill="none"
       stroke-linejoin="round"
       stroke-linecap="square">

      <rect id="segment-right-rect"
            x="18"
            y="5"
            width="11"
            height="22" />

      <!-- internal segment marks -->
      <path id="segment-right-mark-1" d="M 21 10 L 26 10" />
      <path id="segment-right-mark-2" d="M 21 14 L 26 14" />
      <path id="segment-right-mark-3" d="M 21 18 L 26 18" />
      <path id="segment-right-mark-4" d="M 21 22 L 26 22" />
    </g>

  </g>
</svg>