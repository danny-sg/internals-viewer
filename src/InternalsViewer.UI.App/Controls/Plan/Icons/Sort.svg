<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
    <g id="sql-execution-plan-sort-icon">

        <g id="sort-operator-frame"
           stroke="#424242"
           stroke-width="2"
           fill="none"
           stroke-linejoin="round"
           stroke-linecap="square">

            <rect id="sort-main-rect"
                  x="3"
                  y="4"
                  width="26"
                  height="24" />
        </g>

        <g id="sort-az-labels"
           fill="#424242"
           font-family="Arial, Helvetica, sans-serif"
           font-size="9"
           font-weight="700"
           text-anchor="middle">

            <text id="sort-a-label" x="10" y="15">A</text>
            <text id="sort-z-label" x="10" y="25">Z</text>
        </g>

        <g id="sort-direction-arrow" fill="#0078D4">
            <path id="sort-arrow-stem"
                  d="M 21 8 L 21 21"
                  fill="none"
                  stroke="#0078D4"
                  stroke-width="2"
                  stroke-linejoin="round"
                  stroke-linecap="square" />

            <polygon id="sort-arrow-head"
                     points="18,21 21,25 24,21" />
        </g>

    </g>
</svg>