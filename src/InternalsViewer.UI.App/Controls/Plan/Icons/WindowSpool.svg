<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <g id="sql-execution-plan-spool-operator-icon">

    <!-- operator rectangle -->
    <g id="spool-operator-frame"
       stroke="#424242"
       stroke-width="2"
       fill="none"
       stroke-linejoin="round"
       stroke-linecap="square">

      <rect id="spool-main-rect"
            x="3"
            y="4"
            width="26"
            height="24" />
    </g>

    <!-- smaller spool structure -->
    <g id="spool-structure"
       stroke="#0078D4"
       stroke-width="2"
       fill="none"
       stroke-linejoin="round"
       stroke-linecap="square">

      <!-- top cap -->
      <rect id="spool-top-cap"
            x="11"
            y="8"
            width="10"
            height="3" />

      <!-- spool body sides -->
      <path id="spool-left-side"
            d="M 12 11 L 12 21" />

      <path id="spool-right-side"
            d="M 20 11 L 20 21" />

      <!-- winding bands -->
      <path id="spool-band-1"
            d="M 12 14 L 20 14" />

      <path id="spool-band-2"
            d="M 12 17 L 20 17" />

      <path id="spool-band-3"
            d="M 12 20 L 20 20" />

      <!-- bottom cap -->
      <rect id="spool-bottom-cap"
            x="11"
            y="21"
            width="10"
            height="3" />
    </g>

  </g>
</svg>